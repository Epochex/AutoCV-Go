<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>校园招聘网申测试</title>
    <style>
      body { max-width: 760px; margin: 32px auto; font-family: sans-serif; }
      section { padding: 16px; margin: 12px 0; border: 1px solid #ccc; }
      label { display: grid; gap: 4px; margin: 10px 0; }
      input, textarea, select, [role="combobox"] { padding: 8px; }
    </style>
  </head>
  <body>
    <h1>校园招聘简历投递</h1>
    <section>
      <h2>基本信息</h2>
      <label>姓名 <input name="fullName" /></label>
      <label>电子邮箱 <input name="email" type="email" /></label>
      <label>手机号 <input name="phone" type="tel" /></label>
      <label>性别
        <select name="gender" required>
          <option value="">请选择</option>
          <option>男</option>
          <option>女</option>
        </select>
      </label>
      <label>出生日期 <input name="birthDate" type="date" required /></label>
      <label>简历附件 <input name="resumeFile" type="file" accept=".pdf,.doc,.docx" /></label>
      <label>求职网站密码 <input name="accountPassword" type="password" /></label>
      <div class="form-item">
        <label id="city-label">期望城市</label>
        <div role="combobox" aria-labelledby="city-label" aria-required="true" tabindex="0">请选择城市</div>
      </div>
      <label>推荐码 <input name="referral" disabled placeholder="选择推荐渠道后填写" /></label>
      <label>补充说明 <textarea name="extraInfo" required></textarea></label>
    </section>
    <section class="project-experience">
      <h2>项目经历 01</h2>
      <label>项目名称 <input name="projectName1" /></label>
      <label>项目角色 <input name="projectRole1" /></label>
      <label>项目描述 <textarea name="projectDescription1"></textarea></label>
    </section>
    <section class="project-experience">
      <h2>项目经历 02</h2>
      <label>项目名称 <input name="projectName2" /></label>
      <label>项目角色 <input name="projectRole2" /></label>
      <label>项目描述 <textarea name="projectDescription2"></textarea></label>
    </section>
    <button type="button">投递（测试页面不会提交）</button>
  </body>
</html>
